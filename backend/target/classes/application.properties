server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/Hospitialmng
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis (defaults to localhost:6379; override in prod)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# JWT Configuration
app.jwt.secret=${JWT_SECRET:3d6f4c8a1b9e2d7f0c5a8b3e6f1d4c7a0b9e2d5f8c1a4b7e0d3f6c9a2b5e8d1}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Bid Lock TTL in Redis (seconds)
app.bid.lock-ttl-seconds=5
app.bid.cache-ttl-seconds=3600

logging.level.com.bidstream=DEBUG
logging.level.org.springframework.security=WARN
